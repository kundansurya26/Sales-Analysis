version: "3.9"

services:

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesdash_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/sales_dashboard.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
      - ALLOWED_ORIGINS=http://localhost,http://frontend
      - APP_ENV=production
    volumes:
      - db_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Seed job (runs once, then exits) ──────────────────────────────────────
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesdash_seeder
    command: python seed.py
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/sales_dashboard.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
    volumes:
      - db_data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"

  # ── Frontend (React + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: salesdash_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
    driver: local
